[global]
pid = /run/php-fpm.pid
error_log = /data/logs/php-fpm/php-fpm.log
log_level = notice
emergency_restart_threshold = 0
emergency_restart_interval = 0
process_control_timeout = 0
daemonize = no

[www]
user = root
group = root
listen = /run/php-fpm.sock
listen.owner = root
listen.group = root
listen.mode = 0666
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
chdir = /